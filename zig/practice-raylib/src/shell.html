<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <title>Emscripten-Generated Code</title>

    <style>
        canvas.emscripten {
            border: 1px solid #000;
            width: 800px;
            height: 600px;
        }

        .spinner {
            height: 30px;
            width: 30px;
            margin: 0;
            margin-top: 20px;
            margin-left: 20px;
            display: inline-block;
            vertical-align: top;

            -webkit-animation: rotation .8s linear infinite;
            -moz-animation: rotation .8s linear infinite;
            -o-animation: rotation .8s linear infinite;
            animation: rotation 0.8s linear infinite;

            border-left: 5px solid rgb(235, 235, 235);
            border-right: 5px solid rgb(235, 235, 235);
            border-bottom: 5px solid rgb(235, 235, 235);
            border-top: 5px solid rgb(120, 120, 120);

            border-radius: 100%;
            background-color: rgb(189, 215, 46);
        }

        @-webkit-keyframes rotation {
            from {
                -webkit-transform: rotate(0deg);
            }
            to {
                -webkit-transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>


<div class="emscripten_border">
    <form id="form1">
        <label for="ii1">
            <input id="ii1" name="ii1" type="text">
            <input disabled type="submit" value="send">
        </label>
    </form>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    <div class="spinner" id='spinner'></div>
</div>

<script>
    const spinnerElement = document.getElementById('spinner');

    const initWasm = () => {
        document.querySelector('#form1 input[type="submit"]').disabled = false;
    }

    const FromWASM = {
        async fire(evt) {
            await this[evt]();
        },
        async logKeyValue() {
            const r = await fetch('https://my-json-server.typicode.com/sunday00/placeholders/metaVariables/1')
            console.log(await r.json());
        }
    }
</script>

<script type='text/javascript'>
    var Module = {
        onRuntimeInitialized: function () {
            this.setStatus('Preparing...');
            initWasm();
        },
        canvas: document.getElementById('canvas'),

        setStatus(text) {
            Module.setStatus.last ??= {time: Date.now(), text: ''};
            if (text === Module.setStatus.last.text) return;
            const m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
            const now = Date.now();

            // if this is a progress update, skip it if too soon
            if (m && now - Module.setStatus.last.time < 30) return;

            Module.setStatus.last.time = now;
            Module.setStatus.last.text = text;

            if (m) {
                text = m[1];
                spinnerElement.hidden = false;
            } else {
                if (!text) spinnerElement.style.display = 'none';
            }
        },
    }

    Module.setStatus('Downloading...');
</script>

{{{ SCRIPT }}}

<script>
    const ToWASM = {
        module: Module,

        sendEx1(v) {
            // 1. 문자열을 바이트 배열로 변환
            const encoder = new TextEncoder();
            const bytes = encoder.encode(v);

            // 2. Zig가 준비한 버퍼의 메모리 주소 가져오기
            const ptr = Module._getInputBufferPtr();

            // 3. Module.HEAPU8을 통해 Zig 메모리에 데이터 복사
            // ptr 위치부터 bytes 데이터의 길이만큼 덮어씁니다.
            Module.HEAPU8.set(bytes, ptr);

            // 4. Zig에게 "데이터 다 썼으니 처리해!"라고 알림
            Module._processInput(bytes.length);
        }
    }

    document.querySelector('#form1').addEventListener('submit', (e) => {
        e.preventDefault();

        ToWASM.sendEx1(e.target.ii1.value);
    })
</script>
</body>
</html>
